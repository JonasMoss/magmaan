id: bfi_5factor
source:
  data: psychTools::bfi
  model: five broad personality factors over the first 25 items
  url: https://www.personality-project.org/r/html/bfi.html
license_or_terms: psychTools package data; audit before vendoring raw data
n: 2800
variables:
  - A1-A5
  - C1-C5
  - E1-E5
  - N1-N5
  - O1-O5
estimator: ML initially; DWLS later
status: active
data_policy: generated into ignored local cache when psychTools is installed
reference_engine: lavaan
notes: >-
  Treating these ordinal-ish items as continuous is a stress benchmark, not a
  substantive model claim. psychTools is installed; data prepared listwise
  (2436 complete cases) and a continuous-ML lavaan reference is generated.
  magmaan ML does not yet converge on this 25-indicator model (L-BFGS hits the
  iteration cap), so the case currently fails the magmaan side of the smoke.
