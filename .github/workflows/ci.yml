name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layering:
    name: dependency layering (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check layering
        run: bash tests/tools/check_layering.sh

  build-test:
    name: build + ctest (Linux, clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: Configure
        run: cmake --preset default -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build --preset default

      - name: Test
        run: ctest --preset default
